<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مسابقة العائلة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1a1033;
    --bg2:#241447;
    --card:#2e1a5e;
    --card2:#3a2270;
    --line:#4a2f8a;
    --ink:#f4eefe;
    --muted:#b7a6e0;
    --gold:#ffce4a;
    --gold-deep:#f5a623;
    --green:#46d49a;
    --red:#ff6b8a;
    --accent:#a06bff;
    --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Cairo',system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #3a2270 0%, var(--bg) 60%);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding:24px 16px 64px;
  }
  .wrap{max-width:760px;margin:0 auto}
  h1,h2,h3,.display{font-family:'Cairo',sans-serif}
  header.top{text-align:center;margin:12px 0 28px}
  .crown{font-size:40px;line-height:1}
  header.top h1{
    font-size:clamp(30px,7vw,48px);
    font-weight:700;letter-spacing:-.5px;
    background:linear-gradient(180deg,#fff 0%,var(--gold) 120%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-top:4px;
  }
  header.top p{color:var(--muted);margin-top:6px;font-size:15px}
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,206,74,.12);border:1px solid rgba(255,206,74,.35);
    color:var(--gold);font-weight:600;font-size:13px;
    padding:6px 14px;border-radius:999px;margin-top:14px;
  }

  .card{
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px;
    box-shadow:0 18px 40px -20px rgba(0,0,0,.6);
  }
  .section-label{
    font-size:12px;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);font-weight:700;margin-bottom:14px;
  }

  /* leaderboard */
  .board{display:flex;flex-direction:column;gap:10px}
  .row{
    display:grid;grid-template-columns:38px 1fr auto auto;
    align-items:center;gap:12px;
    background:var(--bg2);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;
    transition:transform .15s ease,border-color .15s ease;
  }
  .row:hover{transform:translateY(-1px);border-color:var(--accent)}
  .rank{font-family:'Cairo';font-weight:700;font-size:18px;text-align:center;color:var(--muted)}
  .row.r1 .rank{color:var(--gold)}
  .row.r1{border-color:var(--gold-deep);background:linear-gradient(90deg,rgba(255,206,74,.10),var(--bg2))}
  .who{display:flex;flex-direction:column}
  .who b{font-weight:600;font-size:16px}
  .who small{color:var(--muted);font-size:12px}
  .pts{font-family:'Cairo';font-weight:700;font-size:20px;color:var(--gold)}
  .pts span{font-size:11px;color:var(--muted);font-weight:500;display:block;text-align:right}
  .prog{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:6px;width:100%}
  .prog i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px}
  .winner-tag{font-size:11px;color:var(--green);font-weight:700;margin-top:2px}

  /* player select */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .chip{
    background:var(--bg2);border:1px solid var(--line);color:var(--ink);
    border-radius:14px;padding:16px 8px;font-family:'Cairo';font-weight:600;
    font-size:15px;cursor:pointer;transition:.15s;text-align:center;
  }
  .chip:hover{border-color:var(--accent);transform:translateY(-2px)}
  .chip .av{font-size:24px;display:block;margin-bottom:4px}

  .stack{display:flex;flex-direction:column;gap:18px}

  /* quiz */
  .qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .qmeta .name{font-family:'Cairo';font-weight:600;font-size:18px}
  .qmeta .name .av{margin-right:6px}
  .qcount{color:var(--muted);font-size:13px;font-weight:600}
  .qpts{background:rgba(255,206,74,.14);color:var(--gold);border:1px solid rgba(255,206,74,.3);
    border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;margin-bottom:14px;display:inline-block}
  .question{font-family:'Cairo';font-weight:600;font-size:clamp(20px,5vw,26px);line-height:1.3;margin-bottom:20px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{
    text-align:right;background:var(--bg2);border:1px solid var(--line);color:var(--ink);
    border-radius:14px;padding:15px 18px;font-size:16px;font-weight:500;cursor:pointer;transition:.12s;
  }
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--card2)}
  .opt:disabled{cursor:default;opacity:.95}
  .opt.correct{border-color:var(--green);background:rgba(70,212,154,.16);color:#dffff0}
  .opt.wrong{border-color:var(--red);background:rgba(255,107,138,.16);color:#ffe1e8}

  .btn{
    font-family:'Cairo';font-weight:600;font-size:16px;
    border:none;border-radius:14px;padding:14px 22px;cursor:pointer;width:100%;
    background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#3a1f00;
    transition:.15s;
  }
  .btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--ink)}
  .feedback{text-align:center;font-family:'Cairo';font-weight:600;font-size:18px;margin:6px 0}
  .feedback.ok{color:var(--green)}
  .feedback.no{color:var(--red)}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .back{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:'Cairo'}
  .back:hover{color:var(--ink)}

  /* winner */
  .winner-screen{text-align:center;padding:30px 20px}
  .winner-screen .trophy{font-size:72px}
  .winner-screen h2{font-size:36px;margin:10px 0;color:var(--gold)}
  .winner-screen .prize{
    display:inline-block;margin:14px 0;padding:12px 28px;
    background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#3a1f00;
    border-radius:99px;font-family:'Cairo';font-weight:700;font-size:24px;
  }

  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);
    background:var(--card2);border:1px solid var(--line);color:var(--ink);
    padding:12px 20px;border-radius:14px;font-weight:600;font-size:14px;
    box-shadow:0 12px 30px -8px rgba(0,0,0,.6);transition:transform .3s ease;z-index:50;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .hidden{display:none}
  .loading{text-align:center;color:var(--muted);padding:30px}
  .config-warn{
    background:rgba(255,107,138,.12);border:1px solid var(--red);color:#ffd6df;
    border-radius:14px;padding:14px 16px;font-size:14px;line-height:1.5;margin-bottom:18px;
  }
  .config-warn code{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:5px;font-size:12px}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px}
  @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:30px 1fr auto}.pts{font-size:17px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="crown">👑</div>
    <h1>مسابقة العائلة</h1>
    <p>جاوب صح. اصعد للقمة. كن الأول.</p>
    <div class="pill">🏆 أول من يجاوب الخمسة كلها صح يربح 20 دينار</div>
  </header>

  <div id="app">
    <div class="loading">جاري التحميل…</div>
  </div>

  <footer>للعائلة · مدعوم بـ Firebase</footer>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ========================================================================
   1) FIREBASE CONFIG  — paste your own here (see README)
   ======================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyCif-7UYefwhZTjpnLmjIAgG3bUidjv4ts",
  authDomain: "familygame-2db98.firebaseapp.com",
  projectId: "familygame-2db98",
  storageBucket: "familygame-2db98.firebasestorage.app",
  messagingSenderId: "1027018153882",
  appId: "1:1027018153882:web:0445e2fd224c3523c1e423",
  measurementId: "G-R6J7EX2M03"
};

/* ========================================================================
   الأسئلة — عدّل كما تريد. a = رقم الإجابة الصحيحة (يبدأ من 0)
   ======================================================================== */
const QUESTIONS = [
  { q:"ما هي عاصمة الأردن؟", o:["عمّان","العقبة","إربد","الزرقاء"], a:0, p:20 },
  { q:"كم عدد قارات العالم؟", o:["خمسة","ستة","سبعة","ثمانية"], a:2, p:20 },
  { q:"أي كوكب يُعرف بالكوكب الأحمر؟", o:["الزهرة","المشتري","المريخ","زحل"], a:2, p:20 },
  { q:"مدينة البتراء تقع في أي دولة؟", o:["مصر","الأردن","العراق","سوريا"], a:1, p:20 },
  { q:"ما هي عملة الأردن؟", o:["الدولار","الدينار","الريال","الجنيه"], a:1, p:20 },
];

const WIN_TARGET = QUESTIONS.length;   // لازم يجاوب كل الأسئلة صح (5)
const PRIZE = "20 دينار";

/* ========================================================================
   التطبيق — كل من يسجّل دخول عبر Google يصبح لاعباً تلقائياً
   ======================================================================== */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const root = document.getElementById("app");
const toastEl = document.getElementById("toast");

const AV = ["🦁","🦅","🐯","🦋","🌸","⭐","🐼","🦊","🐶","🐵","🦉","🐧","🐨","🦄","🐸","🐙"];

let boardState = {};
let me = null;
let current = null;
let listening = false;

const configMissing = firebaseConfig.apiKey === "YOUR_API_KEY";

function avatarFor(uid){
  let h=0; for(const c of (uid||"")) h=(h*31+c.charCodeAt(0))>>>0;
  return AV[h % AV.length];
}
function nameFromUser(u){
  return u.displayName || (u.email ? u.email.split("@")[0] : "لاعب");
}
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toastEl.classList.remove("show"), 2400);
}
function spinner(text){
  root.innerHTML = `<div class="loading">
    <div class="spin"></div>
    <p style="margin-top:14px">${text||"جاري التحميل…"}</p>
  </div>`;
}

async function ensureMyPlayer(){
  const ref = doc(db,"players",me.uid);
  const snap = await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{ name:nameFromUser(me), email:me.email||"", correct:0, points:0, answered:[], won:false });
  }
}

function listen(){
  if(listening) return; listening = true;
  onSnapshot(collection(db,"players"), snap=>{
    boardState = {};
    snap.forEach(d=> boardState[d.id]=d.data());
    if(!current) renderHome();
  });
}

async function resetMe(){
  boardState[me.uid] = {...(boardState[me.uid]||{}), correct:0, points:0, answered:[], won:false};
  try{ await updateDoc(doc(db,"players",me.uid), { correct:0, points:0, answered:[], won:false }); }
  catch(e){ toast("تعذّر الحفظ — تحقق من الإعدادات"); }
}

/* ---------- تسجيل الدخول ---------- */
function renderSignIn(){
  current = null;
  root.innerHTML = `
    <div class="stack">
      ${configMissing ? configWarn() : ""}
      <div class="card winner-screen">
        <div class="trophy">🎮</div>
        <h2 style="color:var(--ink)">سجّل الدخول للعب</h2>
        <p style="color:var(--muted)">بضغطة واحدة عبر Google. تنضم للوحة تلقائياً.</p>
        <div style="height:18px"></div>
        <button class="btn" id="google">المتابعة عبر Google</button>
      </div>
    </div>`;
  document.getElementById("google").onclick = async ()=>{
    spinner("جاري تسجيل الدخول…");
    try{ await signInWithPopup(auth, provider); }
    catch(e){
      renderSignIn();
      toast(e.code==="auth/unauthorized-domain"
        ? "أضف هذا النطاق في إعدادات Firebase"
        : "تم إلغاء تسجيل الدخول");
    }
  };
}

/* ---------- الرئيسية / لوحة الصدارة ---------- */
function renderHome(){
  if(configMissing){ root.innerHTML=`<div class="stack">${configWarn()}</div>`; return; }
  if(!me){ renderSignIn(); return; }
  current = null;

  const ranked = Object.entries(boardState)
    .map(([uid,p])=> ({uid, ...p}))
    .sort((a,b)=> b.points-a.points || b.correct-a.correct);

  const meData = boardState[me.uid] || {correct:0,points:0};
  const iWon = meData.correct>=WIN_TARGET;
  const winner = ranked.find(p=>p.correct>=WIN_TARGET);

  root.innerHTML = `
    <div class="stack">
      ${winner ? winnerBanner(winner) : ""}
      <div class="card">
        <div class="topbar">
          <span class="qcount">${avatarFor(me.uid)} ${nameFromUser(me)}</span>
          <button class="back" id="out">تسجيل خروج</button>
        </div>
        <div class="section-label">لوحة الصدارة</div>
        <div class="board">
          ${ranked.length ? ranked.map((p,i)=>`
            <div class="row ${p.uid===me.uid?'r1':''}">
              <div class="rank">${medal(i)}</div>
              <div class="who">
                <b>${avatarFor(p.uid)} ${p.name}${p.uid===me.uid?' (أنت)':''}</b>
                <small>${p.correct}/${WIN_TARGET} صح</small>
                <div class="prog"><i style="width:${Math.min(100,(p.correct/WIN_TARGET)*100)}%"></i></div>
                ${p.correct>=WIN_TARGET?`<div class="winner-tag">🏆 فاز بـ ${PRIZE}</div>`:""}
              </div>
              <div class="pts">${p.points}<span>نقطة</span></div>
            </div>`).join("")
          : `<p style="color:var(--muted)">لا يوجد لاعبون بعد. أنت الأول!</p>`}
        </div>
      </div>
      <div class="card winner-screen">
        <div class="section-label" style="text-align:right">دورك</div>
        <p style="color:var(--muted);margin-bottom:14px">${meData.correct}/${WIN_TARGET} صح · ${meData.points} نقطة</p>
        ${iWon
          ? `<button class="btn" id="play">🔁 العب من جديد</button>`
          : `<button class="btn" id="play">${avatarFor(me.uid)} ابدأ اللعب</button>`}
        <p style="color:var(--muted);font-size:13px;margin-top:12px">لازم تجاوب الأسئلة الخمسة كلها صح علشان تفوز</p>
      </div>
    </div>`;

  document.getElementById("out").onclick = ()=> signOut(auth);
  document.getElementById("play").onclick = async ()=>{
    if(iWon || (meData.answered||[]).length){ await resetMe(); }
    startQuiz();
  };
}

function medal(i){ return ["🥇","🥈","🥉"][i] || (i+1); }

function winnerBanner(p){
  return `<div class="card winner-screen">
    <div class="trophy">🏆</div>
    <h2>${avatarFor(p.uid)} ${p.name} فاز!</h2>
    <div class="prize">${PRIZE}</div>
    <p style="color:var(--muted)">أول من جاوب الأسئلة الخمسة كلها صح.</p>
  </div>`;
}

function configWarn(){
  return `<div class="config-warn">
    ⚠️ لم يتم إعداد Firebase. افتح <code>index.html</code> واستبدل
    <code>firebaseConfig</code> بمفاتيح مشروعك. راجع ملف README.
  </div>`;
}

/* ---------- المسابقة ---------- */
function nextQuestionIndex(){
  const answered = (boardState[me.uid]?.answered)||[];
  for(let i=0;i<QUESTIONS.length;i++) if(!answered.includes(i)) return i;
  return -1;
}

function startQuiz(){ current = me.uid; showQuestion(); }

function showQuestion(){
  const data = boardState[me.uid] || {correct:0,points:0,answered:[]};
  if(data.correct>=WIN_TARGET){ renderHome(); return; }

  const qi = nextQuestionIndex();
  if(qi === -1){ renderHome(); return; }

  const Q = QUESTIONS[qi];
  const num = (data.answered?.length||0)+1;
  root.innerHTML = `
    <div class="card">
      <div class="topbar">
        <button class="back" id="back">← اللوحة</button>
        <span class="qcount">سؤال ${num} من ${QUESTIONS.length}</span>
      </div>
      <div class="qmeta"><span class="name"><span class="av">${avatarFor(me.uid)}</span>${nameFromUser(me)}</span></div>
      <span class="qpts">+${Q.p} نقطة</span>
      <div class="question">${Q.q}</div>
      <div class="opts">
        ${Q.o.map((opt,i)=>`<button class="opt" data-i="${i}">${opt}</button>`).join("")}
      </div>
      <div id="after"></div>
    </div>`;

  document.getElementById("back").onclick = renderHome;
  root.querySelectorAll(".opt").forEach(btn=>{
    btn.onclick = ()=> answer(qi, parseInt(btn.dataset.i), btn);
  });
}

let locked=false;
async function answer(qi, choice, btn){
  if(locked) return; locked=true;
  const Q = QUESTIONS[qi];
  const correct = choice === Q.a;
  const opts = root.querySelectorAll(".opt");
  opts.forEach(o=>o.disabled=true);
  btn.classList.add(correct?"correct":"wrong");
  if(!correct) opts[Q.a].classList.add("correct");

  const after = document.getElementById("after");

  if(!correct){
    // خطأ = خسر الجولة. لازم كلهم صح.
    after.innerHTML = `
      <div class="feedback no">خطأ — لازم كل الأسئلة صح للفوز</div>
      <button class="btn" id="retry">🔁 حاول من جديد</button>
      <div style="height:8px"></div>
      <button class="btn ghost" id="board2">رجوع للوحة</button>`;
    document.getElementById("retry").onclick = async ()=>{ await resetMe(); locked=false; startQuiz(); };
    document.getElementById("board2").onclick = async ()=>{ await resetMe(); locked=false; renderHome(); };
    return;
  }

  const cur = boardState[me.uid] || {correct:0,points:0,answered:[]};
  const answered = [...(cur.answered||[]), qi];
  const newCorrect = (cur.correct||0)+1;
  const newPoints  = (cur.points||0)+Q.p;
  const won = newCorrect>=WIN_TARGET;
  boardState[me.uid] = {...cur, answered, correct:newCorrect, points:newPoints, won};
  try{ await updateDoc(doc(db,"players",me.uid), { answered, correct:newCorrect, points:newPoints, won }); }
  catch(e){ toast("تعذّر الحفظ — تحقق من القواعد"); }

  after.innerHTML = `
    <div class="feedback ok">صح! +${Q.p}</div>
    <button class="btn" id="next">${won?'🏆 شوف النتيجة':'السؤال التالي'}</button>
    <div style="height:8px"></div>
    <button class="btn ghost" id="board2">رجوع للوحة</button>`;
  document.getElementById("board2").onclick = ()=>{ locked=false; renderHome(); };
  document.getElementById("next").onclick = ()=>{ locked=false; won ? renderHome() : showQuestion(); };
  if(won) toast(`مبروك! فزت بـ ${PRIZE} 🏆`);
}

/* ---------- التشغيل ---------- */
(function boot(){
  if(configMissing){ root.innerHTML=`<div class="stack">${configWarn()}</div>`; return; }
  spinner("جاري الاتصال…");
  onAuthStateChanged(auth, async (user)=>{
    me = user;
    if(!user){ renderSignIn(); return; }
    spinner("تحميل اللوحة…");
    try{ await ensureMyPlayer(); listen(); renderHome(); }
    catch(e){ root.innerHTML = `<div class="card config-warn">تعذّر الوصول إلى Firebase. تحقق من الإعدادات والقواعد.<br><br>${e.message}</div>`; }
  });
})();
</script>

<style>
  .spin{
    width:42px;height:42px;border-radius:50%;margin:0 auto;
    border:4px solid var(--line);border-top-color:var(--gold);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spin{animation-duration:2s}}
</style>
</body>
</html>
