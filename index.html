<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سجل الإنسولين</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#F4F6F8;
    --card:#FFFFFF;
    --ink:#16202B;
    --ink-soft:#5A6B7B;
    --line:#DDE3E9;
    --accent:#0E7C7B;
    --accent-dark:#0A5E5D;
    --rapid:#E8833A;
    --long:#2E74C4;
    --other:#7A8694;
    --danger:#C0392B;
    --radius:14px;
    --shadow:0 1px 2px rgba(22,32,43,.05), 0 8px 24px rgba(22,32,43,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding:0 16px 64px;
  }
  .wrap{max-width:680px;margin:0 auto;}

  /* Header */
  header{
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:28px 0 20px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .vial{
    width:26px;height:26px;flex:none;
    border:2px solid var(--ink);border-radius:5px 5px 7px 7px;
    position:relative;background:
      linear-gradient(to top, var(--accent) 0 42%, transparent 42%);
  }
  .vial::before{content:"";position:absolute;top:-6px;left:5px;right:5px;height:5px;background:var(--ink);border-radius:2px;}
  h1{
    font-weight:700;font-size:1.4rem;letter-spacing:-.01em;margin:0;
  }
  .status{
    font-family:"IBM Plex Mono",monospace;font-size:.72rem;
    color:var(--ink-soft);display:flex;align-items:center;gap:7px;direction:ltr;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--other);}
  .dot.on{background:var(--accent);}

  /* Banner */
  .banner{
    background:#FFF6E9;border:1px solid #F2D7A6;color:#7A5418;
    border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;
    font-size:.9rem;display:none;
  }
  .banner code{font-family:"IBM Plex Mono",monospace;background:#0000000d;padding:1px 5px;border-radius:4px;direction:ltr;display:inline-block;}

  /* Summary */
  .summary{
    display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;
  }
  .stat{
    flex:1;min-width:120px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px 16px;
  }
  .stat .k{font-size:.74rem;color:var(--ink-soft);}
  .stat .v{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:1.5rem;margin-top:2px;direction:ltr;}
  .stat .v small{font-size:.8rem;color:var(--ink-soft);font-weight:500;font-family:"IBM Plex Sans Arabic",sans-serif;}

  /* Card / form */
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);
    padding:20px;margin-bottom:24px;
  }
  .card h2{
    font-size:.85rem;font-weight:700;color:var(--ink-soft);
    margin:0 0 16px;
  }
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field.full{grid-column:1 / -1;}
  label{font-size:.82rem;font-weight:500;color:var(--ink-soft);}
  input,select{
    font-family:inherit;font-size:.95rem;color:var(--ink);
    background:var(--paper);border:1px solid var(--line);border-radius:9px;
    padding:10px 12px;width:100%;
  }
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  .units-input{font-family:"IBM Plex Mono",monospace;font-weight:600;}

  .seg{display:flex;gap:6px;}
  .seg button{
    flex:1;font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;
    padding:9px 6px;border-radius:9px;border:1px solid var(--line);
    background:var(--paper);color:var(--ink-soft);
  }
  .seg button[aria-pressed="true"]{color:#fff;border-color:transparent;}
  .seg button.rapid[aria-pressed="true"]{background:var(--rapid);}
  .seg button.long[aria-pressed="true"]{background:var(--long);}
  .seg button.other[aria-pressed="true"]{background:var(--other);}

  .btn{
    font-weight:700;font-size:.95rem;
    color:#fff;background:var(--accent);border:none;border-radius:10px;
    padding:13px 18px;cursor:pointer;width:100%;margin-top:4px;
    transition:background .15s ease;font-family:inherit;
  }
  .btn:hover{background:var(--accent-dark);}
  .btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* Log */
  .daygroup{margin-bottom:22px;}
  .dayhead{
    font-size:.8rem;font-weight:600;color:var(--ink-soft);
    padding:0 4px 8px;display:flex;justify-content:space-between;
  }
  .dayhead .du{font-family:"IBM Plex Mono",monospace;direction:ltr;}
  .entry{
    background:var(--card);border:1px solid var(--line);
    border-inline-start:4px solid var(--other);
    border-radius:12px;padding:14px 16px;margin-bottom:8px;
    display:flex;align-items:center;gap:14px;
  }
  .entry.rapid{border-inline-start-color:var(--rapid);}
  .entry.long{border-inline-start-color:var(--long);}
  .readout{
    font-family:"IBM Plex Mono",monospace;font-weight:600;
    font-size:1.55rem;line-height:1;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;min-width:62px;text-align:start;direction:ltr;
  }
  .readout small{font-size:.65rem;color:var(--ink-soft);margin-inline-start:2px;font-family:"IBM Plex Sans Arabic",sans-serif;}
  .meta{flex:1;min-width:0;}
  .meta .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{
    font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:999px;
    color:#fff;background:var(--other);
  }
  .chip.rapid{background:var(--rapid);}
  .chip.long{background:var(--long);}
  .name{font-weight:600;font-size:.95rem;}
  .time{font-family:"IBM Plex Mono",monospace;font-size:.74rem;color:var(--ink-soft);direction:ltr;}
  .sub{font-size:.84rem;color:var(--ink-soft);margin-top:3px;}
  .del{
    flex:none;border:none;background:none;cursor:pointer;color:var(--ink-soft);
    font-size:1.1rem;padding:6px;border-radius:8px;line-height:1;
  }
  .del:hover{color:var(--danger);background:#C0392B12;}

  .empty{
    text-align:center;color:var(--ink-soft);padding:40px 16px;font-size:.95rem;
  }
  footer{text-align:center;color:var(--ink-soft);font-size:.78rem;padding:8px 0;}

  @media (max-width:520px){
    .grid{grid-template-columns:1fr;}
    .readout{font-size:1.35rem;min-width:54px;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="vial" aria-hidden="true"></div>
      <h1>سجل الإنسولين</h1>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">جارٍ الاتصال…</span></div>
  </header>

  <div class="banner" id="banner">
    لم يتم إعداد Firebase. الصِق إعدادات مشروعك في <code>firebaseConfig</code> داخل سكربت هذا الملف.
  </div>

  <div class="summary">
    <div class="stat"><div class="k">اليوم · الإجمالي</div><div class="v" id="sumUnits">0<small> و</small></div></div>
    <div class="stat"><div class="k">اليوم · الجرعات</div><div class="v" id="sumDoses">0</div></div>
  </div>

  <div class="card">
    <h2>تسجيل جرعة</h2>
    <div class="grid">
      <div class="field full">
        <label>النوع</label>
        <div class="seg" id="seg">
          <button type="button" class="rapid" data-cat="rapid" aria-pressed="true">سريع المفعول</button>
          <button type="button" class="long" data-cat="long" aria-pressed="false">طويل المفعول</button>
          <button type="button" class="other" data-cat="other" aria-pressed="false">أخرى</button>
        </div>
      </div>
      <div class="field">
        <label for="units">الوحدات (و)</label>
        <input class="units-input" id="units" type="number" step="0.5" min="0" inputmode="decimal" placeholder="0" />
      </div>
      <div class="field">
        <label for="when">الوقت</label>
        <input id="when" type="datetime-local" />
      </div>
      <div class="field">
        <label for="name">اسم الإنسولين <span style="font-weight:400">(اختياري)</span></label>
        <input id="name" type="text" placeholder="مثال: هومالوج" autocomplete="off" />
      </div>
      <div class="field">
        <label for="glucose">سكر الدم <span style="font-weight:400">(اختياري)</span></label>
        <input id="glucose" type="number" step="0.1" min="0" inputmode="decimal" placeholder="القراءة" />
      </div>
      <div class="field full">
        <label for="note">ملاحظة <span style="font-weight:400">(اختياري)</span></label>
        <input id="note" type="text" placeholder="قبل الغداء، تصحيح…" autocomplete="off" />
      </div>
    </div>
    <button class="btn" id="save" disabled>تسجيل الجرعة</button>
  </div>

  <div id="log"><div class="empty">لا توجد جرعات مسجّلة بعد.</div></div>

  <footer>سجل شخصي فقط. ليس نصيحة طبية.</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, doc,
    query, orderBy, onSnapshot, serverTimestamp, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ===== 1. ضع إعدادات Firebase هنا =====
  const firebaseConfig = {
  apiKey: "AIzaSyDLAV3MNFDOrYlDbVTaa0HyHjlfhjtbE2I",
  authDomain: "insulin-7766a.firebaseapp.com",
  projectId: "insulin-7766a",
  storageBucket: "insulin-7766a.firebasestorage.app",
  messagingSenderId: "739171138727",
  appId: "1:739171138727:web:8ab0de419a8c3f1fdd6f82",
  measurementId: "G-Z4PKYWR6MF"
};
  // ======================================

  const $ = (id) => document.getElementById(id);
  const dot = $("dot"), statusText = $("statusText");

  if (firebaseConfig.apiKey === "YOUR_API_KEY") {
    $("banner").style.display = "block";
    statusText.textContent = "لا يوجد إعداد";
  }

  let db, uid = null;
  let selectedCat = "rapid";

  // اختيار النوع
  $("seg").addEventListener("click", (e) => {
    const b = e.target.closest("button[data-cat]");
    if (!b) return;
    selectedCat = b.dataset.cat;
    [...$("seg").children].forEach(x => x.setAttribute("aria-pressed", x === b));
  });

  // الوقت الافتراضي = الآن
  function nowLocal(){
    const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,16);
  }
  $("when").value = nowLocal();

  // تهيئة Firebase
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    const auth = getAuth(app);
    onAuthStateChanged(auth, (user) => {
      if (user) { uid = user.uid; ready(); }
    });
    signInAnonymously(auth).catch(err => {
      statusText.textContent = "خطأ مصادقة";
      console.error(err);
    });
  } catch (err) {
    console.error("Firebase init failed:", err);
  }

  function ready(){
    dot.classList.add("on");
    statusText.textContent = "متصل · " + uid.slice(0,6);
    $("save").disabled = false;
    watch();
  }

  // حفظ الجرعة
  $("save").addEventListener("click", async () => {
    const units = parseFloat($("units").value);
    if (!units || units <= 0) { $("units").focus(); return; }
    const whenVal = $("when").value;
    const taken = whenVal ? new Date(whenVal) : new Date();
    const glucose = $("glucose").value ? parseFloat($("glucose").value) : null;

    $("save").disabled = true;
    try {
      await addDoc(collection(db, "users", uid, "doses"), {
        category: selectedCat,
        name: $("name").value.trim() || null,
        units,
        glucose,
        note: $("note").value.trim() || null,
        taken: Timestamp.fromDate(taken),
        created: serverTimestamp()
      });
      $("units").value = ""; $("name").value = "";
      $("glucose").value = ""; $("note").value = "";
      $("when").value = nowLocal();
    } catch (err) {
      console.error(err);
      alert("تعذّر الحفظ. تحقق من قواعد Firestore والاتصال.");
    } finally {
      $("save").disabled = false;
    }
  });

  // قراءة مباشرة
  function watch(){
    const q = query(collection(db, "users", uid, "doses"), orderBy("taken", "desc"));
    onSnapshot(q, (snap) => {
      const rows = [];
      snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
      render(rows);
    }, (err) => {
      console.error(err);
      statusText.textContent = "خطأ قراءة";
    });
  }

  const CAT_LABEL = { rapid: "سريع", long: "طويل", other: "أخرى" };
  const fmtNum = (n) => Number.isInteger(n) ? n : n.toFixed(1);

  function render(rows){
    const log = $("log");

    // ملخص اليوم
    const today = new Date(); today.setHours(0,0,0,0);
    let tUnits = 0, tDoses = 0;
    rows.forEach(r => {
      const t = r.taken?.toDate?.();
      if (t && t >= today) { tUnits += r.units || 0; tDoses++; }
    });
    $("sumUnits").innerHTML = fmtNum(tUnits) + "<small> و</small>";
    $("sumDoses").textContent = tDoses;

    if (!rows.length) {
      log.innerHTML = '<div class="empty">لا توجد جرعات مسجّلة بعد.</div>';
      return;
    }

    // تجميع حسب اليوم
    const groups = {};
    rows.forEach(r => {
      const t = r.taken?.toDate?.() || new Date();
      const key = t.toDateString();
      (groups[key] = groups[key] || []).push({ r, t });
    });

    log.innerHTML = "";
    for (const key in groups) {
      const items = groups[key];
      const dayUnits = items.reduce((s, x) => s + (x.r.units || 0), 0);
      const g = document.createElement("div");
      g.className = "daygroup";
      const head = document.createElement("div");
      head.className = "dayhead";
      head.innerHTML = `<span>${dayLabel(items[0].t)}</span><span class="du">${fmtNum(dayUnits)} و</span>`;
      g.appendChild(head);

      items.forEach(({ r, t }) => {
        const cat = r.category || "other";
        const el = document.createElement("div");
        el.className = "entry " + cat;
        el.innerHTML = `
          <div class="readout">${fmtNum(r.units)}<small>و</small></div>
          <div class="meta">
            <div class="top">
              <span class="chip ${cat}">${CAT_LABEL[cat] || "أخرى"}</span>
              ${r.name ? `<span class="name">${esc(r.name)}</span>` : ""}
              <span class="time">${timeLabel(t)}</span>
            </div>
            ${(r.glucose != null || r.note) ? `<div class="sub">${
              r.glucose != null ? `سكر الدم ${fmtNum(r.glucose)}` : ""
            }${r.glucose != null && r.note ? " · " : ""}${r.note ? esc(r.note) : ""}</div>` : ""}
          </div>
          <button class="del" title="حذف" aria-label="حذف الجرعة">✕</button>`;
        el.querySelector(".del").addEventListener("click", async () => {
          if (!confirm("حذف هذا الإدخال؟")) return;
          try { await deleteDoc(doc(db, "users", uid, "doses", r.id)); }
          catch (e) { console.error(e); }
        });
        g.appendChild(el);
      });
      log.appendChild(g);
    }
  }

  function dayLabel(d){
    const today = new Date(); today.setHours(0,0,0,0);
    const that = new Date(d); that.setHours(0,0,0,0);
    const diff = Math.round((today - that) / 86400000);
    if (diff === 0) return "اليوم";
    if (diff === 1) return "أمس";
    return d.toLocaleDateString("ar", { weekday:"long", month:"long", day:"numeric" });
  }
  function timeLabel(d){
    return d.toLocaleTimeString("ar", { hour:"numeric", minute:"2-digit" });
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }
</script>
</body>
</html>
