<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0E141B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="سجل الإنسولين" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="manifest" href="manifest.json" />
<title>سجل الإنسولين</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#0E141B;
    --card:#19222E;
    --input:#0F1822;
    --ink:#F1F5F9;
    --ink-soft:#9FB0C2;
    --line:#2D3A48;
    --accent:#1FAFA8;
    --accent-dark:#27C2BA;
    --rapid:#F0A04E;
    --long:#4F92E0;
    --good:#36C190;
    --bad:#E5675A;
    --radius:16px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.4);
  }
  html{color-scheme:dark;}
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
    font-size:17.5px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding:0 16px 64px;
    padding-top:env(safe-area-inset-top);
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:560px;margin:0 auto;}

  /* Header */
  header{
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:26px 2px 18px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .vial{
    width:30px;height:30px;flex:none;
    border:2px solid var(--ink);border-radius:6px 6px 8px 8px;
    position:relative;background:linear-gradient(to top, var(--accent) 0 42%, transparent 42%);
  }
  .vial::before{content:"";position:absolute;top:-7px;left:6px;right:6px;height:5px;background:var(--ink);border-radius:2px;}
  h1{font-weight:700;font-size:1.7rem;letter-spacing:-.01em;margin:0;}
  .status{
    font-family:"IBM Plex Mono",monospace;font-size:.8rem;
    color:var(--ink-soft);display:flex;align-items:center;gap:7px;direction:ltr;
  }
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-soft);}
  .dot.on{background:var(--good);}

  /* Banner */
  .banner{
    background:#2A2210;border:1px solid #4A3A14;color:#E3B566;
    border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;
    font-size:.95rem;display:none;
  }
  .banner code{font-family:"IBM Plex Mono",monospace;background:#ffffff14;padding:1px 5px;border-radius:4px;direction:ltr;display:inline-block;}

  /* Summary */
  .summary{display:flex;gap:12px;margin-bottom:22px;}
  .stat{
    flex:1;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:16px 18px;
  }
  .stat .k{font-size:.9rem;color:var(--ink-soft);}
  .stat .v{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:2.1rem;margin-top:3px;direction:ltr;}

  /* Card / form */
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);
    padding:22px;margin-bottom:26px;
  }
  .card h2{font-size:1rem;font-weight:700;color:var(--ink-soft);margin:0 0 18px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .field{display:flex;flex-direction:column;gap:8px;}
  .field.full{grid-column:1 / -1;}
  label{font-size:1rem;font-weight:600;color:var(--ink);}
  label .opt{font-weight:400;color:var(--ink-soft);font-size:.9rem;}
  input{
    font-family:inherit;font-size:1.2rem;color:var(--ink);
    background:var(--input);border:1.5px solid var(--line);border-radius:12px;
    padding:14px 16px;width:100%;min-height:54px;
  }
  input:focus{outline:none;border-color:var(--accent);}
  .units-input{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:1.4rem;}

  .seg{display:flex;gap:10px;}
  .seg button{
    flex:1;font-family:inherit;font-size:1.05rem;font-weight:600;cursor:pointer;
    padding:16px 8px;border-radius:13px;border:1.5px solid var(--line);
    background:var(--input);color:var(--ink-soft);min-height:56px;
  }
  .seg button[aria-pressed="true"]{color:#fff;border-color:transparent;}
  .seg button.rapid[aria-pressed="true"]{background:var(--rapid);color:#1a1206;}
  .seg button.long[aria-pressed="true"]{background:var(--long);}

  .btn{
    font-weight:700;font-size:1.15rem;color:#06201f;background:var(--accent);
    border:none;border-radius:14px;padding:17px 18px;cursor:pointer;width:100%;
    margin-top:8px;min-height:58px;font-family:inherit;transition:background .15s ease;
  }
  .btn:hover{background:var(--accent-dark);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* Log */
  .daygroup{margin-bottom:24px;}
  .dayhead{
    font-size:.95rem;font-weight:700;color:var(--ink-soft);
    padding:0 6px 10px;display:flex;justify-content:space-between;
  }
  .dayhead .du{font-family:"IBM Plex Mono",monospace;direction:ltr;}
  .entry{
    background:var(--card);border:1px solid var(--line);
    border-inline-start:5px solid var(--ink-soft);
    border-radius:14px;margin-bottom:10px;overflow:hidden;
  }
  .entry.rapid{border-inline-start-color:var(--rapid);}
  .entry.long{border-inline-start-color:var(--long);}
  .entry .row{display:flex;align-items:center;gap:16px;padding:16px 18px;cursor:pointer;}
  .entry .row:active{background:#ffffff0a;}
  .entry.open .row{background:#ffffff0a;}
  .readout{
    font-family:"IBM Plex Mono",monospace;font-weight:700;
    font-size:2.2rem;line-height:1;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;min-width:64px;text-align:start;direction:ltr;
  }
  .meta{flex:1;min-width:0;}
  .meta .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .chip{font-size:.9rem;font-weight:700;padding:3px 11px;border-radius:999px;color:#fff;background:var(--ink-soft);}
  .chip.rapid{background:var(--rapid);color:#1a1206;}
  .chip.long{background:var(--long);}
  .time{font-family:"IBM Plex Mono",monospace;font-size:.9rem;color:var(--ink-soft);direction:ltr;}
  .face{font-size:1.6rem;line-height:1;flex:none;}
  .reads{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .read{
    background:var(--input);border:1px solid var(--line);border-radius:9px;
    padding:4px 9px;font-size:.9rem;color:var(--ink-soft);
  }
  .read b{color:var(--ink);font-family:"IBM Plex Mono",monospace;font-weight:600;direction:ltr;}
  .notetxt{font-size:.98rem;color:var(--ink-soft);margin-top:8px;}
  .del{flex:none;border:none;background:none;cursor:pointer;color:var(--ink-soft);font-size:1.4rem;padding:8px;border-radius:10px;line-height:1;}
  .del:active{color:var(--bad);background:#E5675A1a;}

  /* Editor */
  .editor{padding:4px 18px 18px;display:grid;gap:16px;border-top:1px solid var(--line);}
  .editor[hidden]{display:none;}
  .egrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .efield{display:flex;flex-direction:column;gap:7px;}
  .editor label{font-size:.95rem;color:var(--ink-soft);font-weight:600;}
  .moodsel{display:flex;gap:12px;}
  .mood{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;
    font-family:inherit;font-size:1rem;font-weight:600;color:var(--ink-soft);
    background:var(--input);border:1.5px solid var(--line);border-radius:13px;padding:14px 8px;
  }
  .mood .em{font-size:2rem;line-height:1;}
  .mood.good[aria-pressed="true"]{border-color:var(--good);color:var(--good);background:#36c1901a;}
  .mood.bad[aria-pressed="true"]{border-color:var(--bad);color:var(--bad);background:#e5675a1a;}
  .e-save{
    font-family:inherit;font-weight:700;font-size:1.05rem;color:#06201f;
    background:var(--accent);border:none;border-radius:12px;padding:15px;cursor:pointer;min-height:54px;
  }
  .e-save:hover{background:var(--accent-dark);}

  .empty{text-align:center;color:var(--ink-soft);padding:48px 16px;font-size:1.05rem;}
  footer{text-align:center;color:var(--ink-soft);font-size:.85rem;padding:10px 0;}

  @media (max-width:480px){
    .grid,.egrid{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="vial" aria-hidden="true"></div>
      <h1>سجل الإنسولين</h1>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">جارٍ الاتصال…</span></div>
  </header>

  <div class="banner" id="banner">
    لم يتم إعداد Firebase. الصِق إعدادات مشروعك في <code>firebaseConfig</code> داخل سكربت هذا الملف.
  </div>

  <div class="summary">
    <div class="stat"><div class="k">اليوم · الإجمالي</div><div class="v" id="sumUnits">0</div></div>
    <div class="stat"><div class="k">اليوم · الجرعات</div><div class="v" id="sumDoses">0</div></div>
  </div>

  <div class="card">
    <h2>تسجيل جرعة</h2>
    <div class="grid">
      <div class="field full">
        <label>النوع</label>
        <div class="seg" id="seg">
          <button type="button" class="rapid" data-cat="rapid" aria-pressed="true">سريع الأمد</button>
          <button type="button" class="long" data-cat="long" aria-pressed="false">طويل الأمد</button>
        </div>
      </div>
      <div class="field">
        <label for="units">الوحدات</label>
        <input class="units-input" id="units" type="number" step="0.5" min="0" inputmode="decimal" placeholder="0" />
      </div>
      <div class="field">
        <label for="when">الوقت</label>
        <input id="when" type="datetime-local" />
      </div>
      <div class="field full">
        <label for="glucose">القياس <span class="opt">(اختياري)</span></label>
        <input id="glucose" type="number" step="0.1" min="0" inputmode="decimal" placeholder="القراءة عند الجرعة" />
      </div>
      <div class="field full">
        <label for="note">ملاحظة <span class="opt">(اختياري)</span></label>
        <input id="note" type="text" placeholder="قبل الغداء، تصحيح…" autocomplete="off" />
      </div>
    </div>
    <button class="btn" id="save" disabled>تسجيل الجرعة</button>
  </div>

  <div id="log"><div class="empty">لا توجد جرعات مسجّلة بعد.</div></div>

  <footer>سجل شخصي فقط. ليس نصيحة طبية.</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, updateDoc, doc,
    query, orderBy, onSnapshot, serverTimestamp, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ===== 1. إعدادات Firebase =====
  const firebaseConfig = {
    apiKey: "AIzaSyDLAV3MNFDOrYlDbVTaa0HyHjlfhjtbE2I",
    authDomain: "insulin-7766a.firebaseapp.com",
    projectId: "insulin-7766a",
    storageBucket: "insulin-7766a.firebasestorage.app",
    messagingSenderId: "739171138727",
    appId: "1:739171138727:web:8ab0de419a8c3f1fdd6f82",
    measurementId: "G-Z4PKYWR6MF"
  };

  // ===== الحساب الثابت المخفي (نفس البيانات على كل الأجهزة) =====
  const APP_EMAIL = "owner@insulin-7766a.app";
  const APP_PASS  = "Wk1omx1wg11ldaBbDyomtZQc";
  // ==============================================================

  const $ = (id) => document.getElementById(id);
  const dot = $("dot"), statusText = $("statusText");

  if (firebaseConfig.apiKey === "YOUR_API_KEY") {
    $("banner").style.display = "block";
    statusText.textContent = "لا يوجد إعداد";
  }

  let db, uid = null;
  let selectedCat = "rapid";

  $("seg").addEventListener("click", (e) => {
    const b = e.target.closest("button[data-cat]");
    if (!b) return;
    selectedCat = b.dataset.cat;
    [...$("seg").children].forEach(x => x.setAttribute("aria-pressed", x === b));
  });

  function nowLocal(){
    const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,16);
  }
  $("when").value = nowLocal();

  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    const auth = getAuth(app);
    onAuthStateChanged(auth, (user) => { if (user) { uid = user.uid; ready(); } });
    signInWithEmailAndPassword(auth, APP_EMAIL, APP_PASS).catch((err) => {
      const code = err.code || "";
      if (code === "auth/user-not-found" || code === "auth/invalid-credential" || code === "auth/invalid-login-credentials") {
        createUserWithEmailAndPassword(auth, APP_EMAIL, APP_PASS).catch((e) => {
          statusText.textContent = "خطأ مصادقة"; console.error(e);
        });
      } else { statusText.textContent = "خطأ مصادقة"; console.error(err); }
    });
  } catch (err) { console.error("Firebase init failed:", err); }

  function ready(){
    dot.classList.add("on");
    statusText.textContent = "متصل";
    $("save").disabled = false;
    watch();
  }

  // حفظ جرعة جديدة
  $("save").addEventListener("click", async () => {
    const units = parseFloat($("units").value);
    if (!units || units <= 0) { $("units").focus(); return; }
    const whenVal = $("when").value;
    const taken = whenVal ? new Date(whenVal) : new Date();
    const glucose = $("glucose").value ? parseFloat($("glucose").value) : null;

    $("save").disabled = true;
    try {
      await addDoc(collection(db, "users", uid, "doses"), {
        category: selectedCat,
        units,
        glucose, g1:null, g2:null, g3:null,
        note: $("note").value.trim() || null,
        mood: null,
        taken: Timestamp.fromDate(taken),
        created: serverTimestamp()
      });
      $("units").value = ""; $("glucose").value = ""; $("note").value = "";
      $("when").value = nowLocal();
    } catch (err) {
      console.error(err); alert("تعذّر الحفظ. تحقق من القواعد والاتصال.");
    } finally { $("save").disabled = false; }
  });

  function watch(){
    const q = query(collection(db, "users", uid, "doses"), orderBy("taken", "desc"));
    onSnapshot(q, (snap) => {
      const rows = [];
      snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
      render(rows);
    }, (err) => { console.error(err); statusText.textContent = "خطأ قراءة"; });
  }

  const CAT_LABEL = { rapid: "سريع الأمد", long: "طويل الأمد" };
  const FACE = { good: "🙂", bad: "🙁" };
  const fmtNum = (n) => Number.isInteger(n) ? n : n.toFixed(1);

  function render(rows){
    const log = $("log");

    const today = new Date(); today.setHours(0,0,0,0);
    let tUnits = 0, tDoses = 0;
    rows.forEach(r => {
      const t = r.taken?.toDate?.();
      if (t && t >= today) { tUnits += r.units || 0; tDoses++; }
    });
    $("sumUnits").textContent = fmtNum(tUnits);
    $("sumDoses").textContent = tDoses;

    if (!rows.length) { log.innerHTML = '<div class="empty">لا توجد جرعات مسجّلة بعد.</div>'; return; }

    const groups = {};
    rows.forEach(r => {
      const t = r.taken?.toDate?.() || new Date();
      const key = t.toDateString();
      (groups[key] = groups[key] || []).push({ r, t });
    });

    log.innerHTML = "";
    for (const key in groups) {
      const items = groups[key];
      const dayUnits = items.reduce((s, x) => s + (x.r.units || 0), 0);
      const g = document.createElement("div");
      g.className = "daygroup";
      const head = document.createElement("div");
      head.className = "dayhead";
      head.innerHTML = `<span>${dayLabel(items[0].t)}</span><span class="du">${fmtNum(dayUnits)}</span>`;
      g.appendChild(head);

      items.forEach(({ r, t }) => {
        const cat = (r.category === "rapid" || r.category === "long") ? r.category : "";
        const reads = [];
        if (r.glucose != null) reads.push(["القياس", r.glucose]);
        if (r.g1 != null) reads.push(["بعد ساعة", r.g1]);
        if (r.g2 != null) reads.push(["بعد ساعتين", r.g2]);
        if (r.g3 != null) reads.push(["بعد ٣ ساعات", r.g3]);

        const el = document.createElement("div");
        el.className = "entry " + cat;
        el.innerHTML = `
          <div class="row">
            <div class="readout">${fmtNum(r.units)}</div>
            <div class="meta">
              <div class="top">
                ${cat ? `<span class="chip ${cat}">${CAT_LABEL[cat]}</span>` : ""}
                <span class="time">${timeLabel(t)}</span>
                ${r.mood ? `<span class="face">${FACE[r.mood]||""}</span>` : ""}
              </div>
              ${reads.length ? `<div class="reads">${reads.map(([k,v])=>`<span class="read">${k} <b>${fmtNum(v)}</b></span>`).join("")}</div>` : ""}
              ${r.note ? `<div class="notetxt">${esc(r.note)}</div>` : ""}
            </div>
            <button class="del" title="حذف" aria-label="حذف الجرعة">✕</button>
          </div>
          <div class="editor" hidden>
            <div class="egrid">
              <div class="efield"><label>القياس</label><input class="e-g0" type="number" step="0.1" min="0" inputmode="decimal" value="${r.glucose ?? ""}" placeholder="—" /></div>
              <div class="efield"><label>بعد ساعة</label><input class="e-g1" type="number" step="0.1" min="0" inputmode="decimal" value="${r.g1 ?? ""}" placeholder="—" /></div>
              <div class="efield"><label>بعد ساعتين</label><input class="e-g2" type="number" step="0.1" min="0" inputmode="decimal" value="${r.g2 ?? ""}" placeholder="—" /></div>
              <div class="efield"><label>بعد ٣ ساعات</label><input class="e-g3" type="number" step="0.1" min="0" inputmode="decimal" value="${r.g3 ?? ""}" placeholder="—" /></div>
            </div>
            <div class="efield"><label>ملاحظة</label><input class="e-note" type="text" value="${r.note ? esc(r.note) : ""}" placeholder="اكتب ملاحظة…" /></div>
            <div class="efield">
              <label>الرضى عن الجرعة</label>
              <div class="moodsel">
                <button type="button" class="mood good" data-mood="good" aria-pressed="${r.mood==='good'}"><span class="em">🙂</span>راضٍ</button>
                <button type="button" class="mood bad" data-mood="bad" aria-pressed="${r.mood==='bad'}"><span class="em">🙁</span>غير راضٍ</button>
              </div>
            </div>
            <button class="e-save">حفظ</button>
          </div>`;

        const editor = el.querySelector(".editor");

        el.querySelector(".row").addEventListener("click", (e) => {
          if (e.target.closest(".del")) return;
          const open = editor.hasAttribute("hidden");
          editor.toggleAttribute("hidden", !open);
          el.classList.toggle("open", open);
        });

        // اختيار الوجه
        editor.querySelectorAll(".mood").forEach(btn => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const already = btn.getAttribute("aria-pressed") === "true";
            editor.querySelectorAll(".mood").forEach(b => b.setAttribute("aria-pressed", "false"));
            btn.setAttribute("aria-pressed", already ? "false" : "true");
          });
        });

        el.querySelector(".e-save").addEventListener("click", async (e) => {
          e.stopPropagation();
          const num = (sel) => { const v = editor.querySelector(sel).value; return v ? parseFloat(v) : null; };
          const moodBtn = editor.querySelector('.mood[aria-pressed="true"]');
          try {
            await updateDoc(doc(db, "users", uid, "doses", r.id), {
              glucose: num(".e-g0"), g1: num(".e-g1"), g2: num(".e-g2"), g3: num(".e-g3"),
              note: editor.querySelector(".e-note").value.trim() || null,
              mood: moodBtn ? moodBtn.dataset.mood : null
            });
          } catch (err) { console.error(err); alert("تعذّر الحفظ."); }
        });

        el.querySelector(".del").addEventListener("click", async (e) => {
          e.stopPropagation();
          if (!confirm("حذف هذا الإدخال؟")) return;
          try { await deleteDoc(doc(db, "users", uid, "doses", r.id)); }
          catch (err) { console.error(err); }
        });

        g.appendChild(el);
      });
      log.appendChild(g);
    }
  }

  function dayLabel(d){
    const today = new Date(); today.setHours(0,0,0,0);
    const that = new Date(d); that.setHours(0,0,0,0);
    const diff = Math.round((today - that) / 86400000);
    if (diff === 0) return "اليوم";
    if (diff === 1) return "أمس";
    return d.toLocaleDateString("ar", { weekday:"long", month:"long", day:"numeric" });
  }
  function timeLabel(d){ return d.toLocaleTimeString("ar", { hour:"numeric", minute:"2-digit" }); }
  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
</script>
